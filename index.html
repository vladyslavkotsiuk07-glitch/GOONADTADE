<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Special Question ❤️</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(135deg,#ff9a9e,#fad0c4);
        overflow:hidden;
    }

    .container{
        text-align:center;
        background:white;
        padding:40px;
        border-radius:20px;
        box-shadow:0 10px 30px rgba(0,0,0,0.2);
    }

    h1{
        color:#ff4f81;
        margin-bottom:15px;
    }

    p{
        color:#555;
        margin-bottom:30px;
        font-size:18px;
    }

    .buttons{
        position:relative;
        height:100px;
    }

    button{
        border:none;
        padding:15px 35px;
        font-size:18px;
        border-radius:50px;
        cursor:pointer;
        transition:0.3s;
    }

    #yesBtn{
        background:#ff4f81;
        color:white;
        margin-right:15px;
    }

    #yesBtn:hover{
        transform:scale(1.1);
    }

    #noBtn{
        background:#ddd;
        position:absolute;
    }

    .success{
        display:none;
        margin-top:20px;
        font-size:24px;
        color:#ff4f81;
        font-weight:bold;
    }
</style>
</head>
<body>

<div class="container">
    <h1>Hey Beautiful Aneta ❤️</h1>
    <p>
        Every moment with you makes my day Harder.
        So I have one important question...
    </p>

    <h2 style="margin-bottom:30px;">
        Will you go on a date with me and eat jerry? 🌹
    </h2>

    <div class="buttons">
        <button id="yesBtn">Yes ❤️</button>
        <button id="noBtn">No 😅</button>
    </div>

    <div class="success" id="successMessage">
        Yay! 🎉 I can't wait you piss on my face! ❤️
    </div>
</div>

<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const successMessage = document.getElementById("successMessage");

noBtn.addEventListener("mouseover", () => {
    const maxX = window.innerWidth - 150;
    const maxY = window.innerHeight - 100;

    noBtn.style.left = Math.random() * maxX + "px";
    noBtn.style.top = Math.random() * maxY + "px";
});

yesBtn.addEventListener("click", () => {
    successMessage.style.display = "block";
});
</script>

</body>
</html>
